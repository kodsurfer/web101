<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Кристалл с вращением от мыши</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 100;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div id="info">✨ Кристалл — двигайте мышью</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.126.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.126.0/examples/jsm/controls/OrbitControls.js'; // (не используется, но оставлен для примера)

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false;
        document.body.appendChild(renderer.domElement);

       
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0x4466ff, 1, 10);
        pointLight1.position.set(3, 4, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff44aa, 0.8, 10);
        pointLight2.position.set(-4, -2, -3);
        scene.add(pointLight2);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);


        const geometry = new THREE.IcosahedronGeometry(1.5, 2);
        
        const material = new THREE.MeshPhongMaterial({
            color: 0x88aaff,
            emissive: 0x224488,
            shininess: 60,
            transparent: true,
            opacity: 0.85,
            flatShading: false,
            side: THREE.DoubleSide
        });

        const crystal = new THREE.Mesh(geometry, material);
        crystal.castShadow = false;
        crystal.receiveShadow = false;
        scene.add(crystal);


        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            const r = 15 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            starsPositions[i+1] = Math.sin(phi) * Math.sin(theta) * r;
            starsPositions[i+2] = Math.cos(phi) * r;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.1, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);


        let targetRotationY = 0;
        let targetRotationX = 0;
        const sensitivity = 0.5;

        window.addEventListener('mousemove', (event) => {
            const mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            const mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

            targetRotationY = mouseX * Math.PI;        // от -PI до PI
            targetRotationX = mouseY * (Math.PI / 3);  // от -60° до 60°
        });

        window.addEventListener('touchmove', (event) => {
            if (event.touches.length) {
                const touch = event.touches[0];
                const mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
                const mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
                targetRotationY = mouseX * Math.PI;
                targetRotationX = mouseY * (Math.PI / 3);
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            crystal.rotation.y += (targetRotationY - crystal.rotation.y) * 0.1;
            crystal.rotation.x += (targetRotationX - crystal.rotation.x) * 0.1;

            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
